<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在打开 Obsidian...</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a2e; color: #fff; }
    .card { text-align: center; padding: 40px; background: #16213e; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    h1 { font-size: 20px; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 14px; margin: 0; }
    .fallback { margin-top: 24px; padding: 16px; background: #0f3460; border-radius: 8px; font-size: 13px; display: none; }
    .fallback a { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>正在打开 Obsidian...</h1>
    <p id="status">如果未自动跳转，请点击下方链接</p>
    <div class="fallback" id="fallback"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const vault = params.get("vault") || "Obsidian";
    const filename = params.get("filename") || "";
    const obsidianUrl = "obsidian://advanced-uri?vault=" + encodeURIComponent(vault) + "&filename=" + encodeURIComponent(filename);
    document.getElementById("fallback").innerHTML = "<a href="" + obsidianUrl + "">点击打开 Obsidian</a>";
    document.getElementById("fallback").style.display = "block";
    location.href = obsidianUrl;
  <\/script>
</body>
</html>
