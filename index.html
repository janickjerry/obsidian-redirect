<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>正在打开 Obsidian...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #16213e; border-radius: 16px; padding: 40px; max-width: 480px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); text-align: center; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
    .info { background: #0f3460; border-radius: 8px; padding: 16px; margin-bottom: 20px; text-align: left; }
    .info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #1a4a7a; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #60a5fa; }
    .info-value { color: #e2e8f0; font-family: monospace; word-break: break-all; text-align: right; max-width: 60%; }
    .btn { display: inline-block; background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 14px 28px; font-size: 16px; cursor: pointer; text-decoration: none; margin: 6px; transition: background 0.2s; }
    .btn:hover { background: #2563eb; }
    .btn-secondary { background: #0f3460; border: 1px solid #3b82f6; }
    .btn-secondary:hover { background: #1a4a7a; }
    .footer { margin-top: 24px; font-size: 12px; color: #475569; }
    .status { margin-top: 12px; font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>&#128279; 正在跳转到 Obsidian</h1>
    <p>如果未自动跳转，请点击下方按钮</p>
    <div class="info">
      <div class="info-row"><span class="info-label">Vault</span><span class="info-value" id="vaultDisplay">-</span></div>
      <div class="info-row"><span class="info-label">&#25991;&#20214;&#36335;&#24402;</span><span class="info-value" id="filenameDisplay">-</span></div>
      <div class="info-row"><span class="info-label">&#24179;&#21488;</span><span class="info-value" id="platformDisplay">-</span></div>
    </div>
    <a id="openBtn" class="btn" href="#">&#28857;&#20987;&#25171;&#24320; Obsidian</a>
    <br>
    <button class="btn btn-secondary" onclick="copyLink()">&#22797;&#21046;&#38142;&#25509;</button>
    <div class="status" id="statusText">&#27491;&#22312;&#33258;&#21160;&#36339;&#36716;...</div>
    <div class="footer">&#38656;&#35201; Obsidian + Advanced URI &#25554;&#20214;</div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const vault = params.get("vault") || "Obsidian";
    const filename = params.get("filename") || "";
    
    // 检测平台
    const ua = navigator.userAgent;
    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    
    // 编码参数
    const encVault = encodeURIComponent(vault);
    const encFilename = encodeURIComponent(filename);
    
    // 生成链接
    let openUrl;
    let platformName;
    
    if (isAndroid) {
      // Android 使用 intent:// 协议（Discord 内嵌浏览器支持）
      openUrl = `intent://advanced-uri?vault=${encVault}&filename=${encFilename}#Intent;scheme=obsidian;package=md.obsidian;end`;
      platformName = "Android (intent://)";
    } else {
      // iOS/Mac/其他使用 obsidian:// 协议
      openUrl = `obsidian://advanced-uri?vault=${encVault}&filename=${encFilename}`;
      platformName = isIOS ? "iOS (obsidian://)" : "Desktop (obsidian://)";
    }
    
    // 显示信息
    document.getElementById("vaultDisplay").textContent = vault;
    document.getElementById("filenameDisplay").textContent = filename;
    document.getElementById("platformDisplay").textContent = platformName;
    document.getElementById("openBtn").href = openUrl;
    
    // 自动跳转
    window.location.href = openUrl;
    
    // 更新状态（如果还在页面上说明跳转失败）
    setTimeout(function() {
      document.getElementById("statusText").textContent = "&#33258;&#21160;&#36339;&#36716;&#21487;&#33021;&#34987;&#38450;&#27491;&#65292;&#35831;&#25163;&#21160;&#28857;&#20987;&#25353;&#38190;";
    }, 1500);
    
    function copyLink() {
      const textToCopy = isAndroid 
        ? `intent://advanced-uri?vault=${encVault}&filename=${encFilename}#Intent;scheme=obsidian;package=md.obsidian;end`
        : `obsidian://advanced-uri?vault=${encVault}&filename=${encFilename}`;
      
      navigator.clipboard.writeText(textToCopy).then(function() {
        alert("&#38142;&#25509;&#24050;&#22797;&#21046;&#65292;&#21487;&#22312;&#27983;&#35270;&#22120;&#22320;&#22438;&#25171;&#24320;");
      }, function() {
        prompt("&#22797;&#21046;&#22833;&#25928;&#65292;&#35831;&#25163;&#21160;&#22797;&#21046;&#65306;", textToCopy);
      });
    }
  </script>
</body>
</html>
